<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Casino</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    :root { 
        --gold: #ffd700; 
        --slot-size: 110px; 
        --neon-green: #00ff00;
        --neon-red: #ff4444;
    }

    /* Анимированный переливающийся фон */
    body {
        margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
        background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0a0a0a);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        font-family: 'Arial', sans-serif; color: white; overflow: hidden;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .main-layout { display: flex; flex-direction: column; align-items: center; gap: 15px; }
    
    .pay-table {
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 215, 0, 0.3);
        padding: 10px;
        border-radius: 15px;
        display: flex;
        gap: 15px;
        font-size: 0.9rem;
        margin-bottom: 5px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .pay-item { display: flex; align-items: center; gap: 5px; }

    .casino-container {
        background: rgba(10, 10, 10, 0.9); 
        padding: 25px; border-radius: 30px;
        border: 2px solid #555; 
        box-shadow: 0 0 80px rgba(0,0,0,1), inset 0 0 20px rgba(255,255,255,0.05);
    }

    .info-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.3rem; color: var(--gold); }
    .slot-machine { display: flex; gap: 10px; background: #000; padding: 15px; border-radius: 20px; box-shadow: inset 0 0 20px #000; }
    .reel { width: var(--slot-size); height: calc(var(--slot-size) * 3); background: #fff; border-radius: 10px; overflow: hidden; position: relative; border: 2px solid #222; }
    .symbol-container { position: absolute; width: 100%; bottom: 0; left: 0; display: flex; flex-direction: column-reverse; }
    .symbol { width: var(--slot-size); height: var(--slot-size); display: flex; justify-content: center; align-items: center; font-size: 60px; color: #000; background: #fff; box-sizing: border-box; }
    
    .win-display {
        width: 100%; background: #050505; border: 2px inset #333;
        border-radius: 10px; padding: 10px; margin-top: 15px;
        text-align: center; min-height: 40px; display: flex;
        justify-content: center; align-items: center;
    }

    /* Свечение выигрышного текста */
    .win-text { 
        color: var(--neon-green); 
        font-size: 1.5rem; 
        font-weight: bold; 
        margin: 0; 
        text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
        animation: glowPulse 1.5s infinite alternate;
    }

    @keyframes glowPulse {
        from { opacity: 0.8; text-shadow: 0 0 5px var(--neon-green); }
        to { opacity: 1; text-shadow: 0 0 15px var(--neon-green), 0 0 25px var(--gold); }
    }

    .controls { margin-top: 20px; display: flex; gap: 25px; align-items: center; justify-content: center; }
    
    button {
        padding: 15px 50px; font-size: 1.5rem; 
        background: linear-gradient(180deg, #ffcc00, #b8860b);
        border: none; border-radius: 12px; cursor: pointer; font-weight: bold; color: #000;
        box-shadow: 0 5px 0 #7a5a00, 0 10px 20px rgba(0,0,0,0.5); 
        transition: 0.1s;
    }

    button:hover { filter: brightness(1.1); }
    button:active { transform: translateY(3px); box-shadow: 0 2px 0 #7a5a00; }
    button:disabled { filter: grayscale(1); opacity: 0.5; }

    input { width: 80px; padding: 10px; border-radius: 10px; border: none; text-align: center; font-size: 1.2rem; background: #222; color: #fff; border: 1px solid #444; }

    .win-board { width: 100%; min-height: 40px; text-align: center; font-size: 1.6rem; font-weight: bold; letter-spacing: 2px; }

    /* Спец-эффекты для статуса */
    #status.win { 
        color: var(--neon-green); 
        text-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--neon-green); 
    }
    #status.loss { 
        color: var(--neon-red); 
        text-shadow: 0 0 10px var(--neon-red); 
        opacity: 0.7;
    }
</style>
</head>
<body>

<div class="main-layout">
    <div class="pay-table" id="pay-table"></div>

    <div class="casino-container">
        <div class="info-bar">
            <div>💰 Баланс: <span id="balance">0</span></div>
            <div>Ставка: <span id="cur-bet">10</span></div>
        </div>
        <div class="slot-machine">
            <div class="reel" id="reel0"><div class="symbol-container"></div></div>
            <div class="reel" id="reel1"><div class="symbol-container"></div></div>
            <div class="reel" id="reel2"><div class="symbol-container"></div></div>
            <div class="reel" id="reel3"><div class="symbol-container"></div></div>
            <div class="reel" id="reel4"><div class="symbol-container"></div></div>
        </div>
        
        <div class="win-display">
            <p class="win-text" id="win-amount"></p>
        </div>

        <div class="controls">
            <input type="number" id="bet" value="10" min="1">
            <button id="spin-btn">КРУТИТЬ</button>
        </div>
    </div>
    <div class="win-board" id="status">ГОТОВ К ИГРЕ</div>
</div>

<script>
    const SUPABASE_URL = 'https://quvreuivfakvwnkladyn.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dnJldWl2ZmFrdndua2xhZHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMTcwMTYsImV4cCI6MjA4NzU5MzAxNn0.DHDExh0SiXpBo8Cov3s4Snvck4QA4gHHgpRxXVC6DS0';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const SYMBOL_DATA = {
        '💰': { value: 5, label: 'Gold' },
        '🐵': { value: 4, label: 'Monkey' },
        '🌴': { value: 3, label: 'Palm' },
        '🥥': { value: 2,  label: 'Coco' },
        '🍌': { value: 1,  label: 'Banana' }
    };
    const SYMBOLS = Object.keys(SYMBOL_DATA);
    
    let currentBalance = 0, isSpinning = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 1. Звук прокрута тише (изменено значение Gain)
    function playSpinSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.01, audioCtx.currentTime); // Было 0.05, стало 0.01
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playWinSound() {
        [261, 329, 392, 523].forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime + i * 0.1); // Win тоже чуть тише
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.1 + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.1); osc.stop(audioCtx.currentTime + i * 0.1 + 0.3);
        });
    }

    function init() {
        // Отрисовка таблицы выплат (Пункт 3)
        const payTableWrap = document.getElementById('pay-table');
        SYMBOLS.forEach(s => {
            payTableWrap.innerHTML += `<div class="pay-item"><span>${s}</span> <b>x${SYMBOL_DATA[s].value}</b></div>`;
        });

        const grid = Array.from({ length: 5 }, () => []);
        for (let x = 0; x < 5; x++) {
            const container = document.querySelector(`#reel${x} .symbol-container`);
            for (let y = 0; y < 3; y++) {
                const sym = getSafeSymbol(x, y, grid);
                grid[x][y] = sym;
                addSymbol(container, sym);
            }
        }
        loadUser();
    }

    function getSafeSymbol(x, y, grid) {
        let available = [...SYMBOLS];
        if (x > 0) available = available.filter(s => s !== grid[x-1][y]);
        if (y > 0) available = available.filter(s => s !== grid[x][y-1]);
        return available[Math.floor(Math.random() * available.length)];
    }

    function addSymbol(container, sym) {
        const div = document.createElement('div');
        div.className = 'symbol';
        div.innerHTML = sym;
        container.appendChild(div);
    }

    async function loadUser() {
        const { data } = await sb.from('players').select('balance').eq('username', 'Алёна').single();
        if (data) { currentBalance = data.balance; updateUI(); }
    }
    
    async function loadBalance() {
        await sb.from('players').update({ balance: currentBalance }).eq('username', 'Алёна');
    }

    function updateUI() { 
        document.getElementById('balance').innerText = Math.floor(currentBalance); 
        document.getElementById('cur-bet').innerText = document.getElementById('bet').value;
    }

    async function spin() {
        if (isSpinning) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const bet = parseInt(document.getElementById('bet').value);
        if (bet > currentBalance) return alert("Недостаточно средств");

        isSpinning = true;
        document.getElementById('spin-btn').disabled = true;
        document.getElementById('status').innerText = "УДАЧИ...";
        document.getElementById('win-amount').innerText = ""; // Очистка плашки
        document.getElementById('status').className = '';

        currentBalance -= bet; updateUI();
        loadBalance();

        const { data } = await sb.from('iswinner').select('result').single();
        const result = data ? data.result : 0;
        const isJackpot = (result === 1);
        const finalGrid = Array.from({ length: 5 }, () => []);

        const soundInterval = setInterval(playSpinSound, 100);

        for (let i = 0; i < 5; i++) {
            const container = document.querySelector(`#reel${i} .symbol-container`);
            const spinLen = 20 + (i * 4);
            
            for(let k=0; k < spinLen; k++) addSymbol(container, SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]);

            for(let y=0; y<3; y++) {
                let sym;
                if (isJackpot) {
                    sym = (y === 1) ? '💰' : SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
                } else {
                    sym = getSafeSymbol(i, y, finalGrid);
                }
                finalGrid[i][y] = sym;
                addSymbol(container, sym);
            }

            container.style.transition = `transform ${2.5 + i * 0.4}s cubic-bezier(0.4, 0, 0.2, 1)`;
            container.style.transform = `translateY(${(spinLen + 3) * 110}px)`;
        }

        setTimeout(() => {
            clearInterval(soundInterval);
            for(let i=0; i<5; i++) {
                const container = document.querySelector(`#reel${i} .symbol-container`);
                container.style.transition = 'none';
                container.style.transform = 'translateY(0)';
                container.innerHTML = '';
                finalGrid[i].forEach(s => addSymbol(container, s));
            }

            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;

            if (isJackpot) {
                const winAmount = bet * 50;
                currentBalance += winAmount;
                updateUI();
                loadBalance();
                playWinSound();
                document.getElementById('status').innerText = "ДЖЕКПОТ!";
                document.getElementById('status').className = 'win';
                // Текст в плашку (Пункт 2)
                document.getElementById('win-amount').innerText = `ВЫИГРЫШ: +${winAmount} рублей💰 `;
            } else {
                document.getElementById('status').innerText = "ПРОИГРАЛ!";
                document.getElementById('status').className = 'loss';
                document.getElementById('win-amount').innerText = "0";
            }
        }, 4500);
    }

    init();
    document.getElementById('spin-btn').addEventListener('click', spin);
    document.getElementById('bet').addEventListener('input', updateUI);
</script>
</body>
</html>
